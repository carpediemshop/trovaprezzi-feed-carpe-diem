client_id = "708cedcb9f2f29975f27375eb61ec330"
name = "Trovaprezzi Feed Carpe Diem"
application_url = "https://trovaprezzi-feed-carpe-diem.onrender.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "https://trovaprezzi-feed-carpe-diem.onrender.com/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "https://trovaprezzi-feed-carpe-diem.onrender.com/webhooks/app/scopes_update"

[access_scopes]
scopes = "read_products,write_products"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [
  "https://trovaprezzi-feed-carpe-diem.onrender.com/auth/callback",
  "https://trovaprezzi-feed-carpe-diem.onrender.com/auth/shopify/callback",
  "https://trovaprezzi-feed-carpe-diem.onrender.com/api/auth/callback"
]

[product.metafields.app.demo_info]
type = "single_line_text_field"
name = "Demo Source Info"
description = "Tracks products created by the Shopify app template for development"

  [product.metafields.app.demo_info.access]
  admin = "merchant_read_write"

[metaobjects.app.example]
name = "Example"
description = "An example metaobject definition created by this template"

  [metaobjects.app.example.access]
  admin = "merchant_read_write"

[metaobjects.app.example.fields.title]
name = "Title"
type = "single_line_text_field"
required = true

[metaobjects.app.example.fields.description]
name = "Description"
type = "multi_line_text_field"
